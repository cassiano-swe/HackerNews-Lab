services:
  api:
    container_name: hacker-news-lab-api
    build:
      context: .
      dockerfile: src/hacker.news.lab.api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      - redis
      - rabbitmq

  worker:
    build:
      context: .
      dockerfile: src/hacker.news.lab.worker/Dockerfile
    container_name: hacker.news.lab.worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Queue=refresh-best-stories    

  redis:
    image: redis:7-alpine
    container_name: hacker-news-lab-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: hacker-news-lab-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
